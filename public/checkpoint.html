<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Received — ph4smo.club</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: none;
        }
        
        * { cursor: none !important; }
        
        @media (max-width: 768px) {
            body, * { cursor: auto !important; }
            .cursor, .cursor-dot { display: none; }
        }
        
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,.4);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease;
            transform: translate(-50%, -50%);
        }
        
        .cursor-dot {
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        
        .logo {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 40px;
            text-align: center;
        }
        
        .card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(20px);
        }
        
        .error-card { 
            border-color: rgba(239,68,68,0.3);
            background: rgba(239,68,68,0.05);
        }
        
        .success-icon { 
            font-size: 3rem; 
            margin-bottom: 16px; 
        }
        
        .error-icon { 
            color: #ef4444; 
        }
        
        .card-title { 
            font-size: 1.5rem; 
            font-weight: 700; 
            margin-bottom: 8px; 
        }
        
        .card-desc { 
            color: #666; 
            font-size: 0.9rem; 
            margin-bottom: 28px; 
            line-height: 1.5; 
        }
        
        .key-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px 20px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            color: #fff;
            margin-bottom: 16px;
            word-break: break-all;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .key-box:hover { 
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
        }
        
        .copy-hint { 
            color: #666; 
            font-size: 0.8rem; 
            margin-bottom: 28px; 
        }
        
        .copy-hint.copied { 
            color: #22c55e; 
        }
        
        .info-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            margin-bottom: 24px;
        }
        
        .info-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 6px 0; 
            font-size: 0.9rem; 
        }
        
        .info-label { 
            color: #666; 
        }
        
        .info-value { 
            color: #fff; 
            font-weight: 600; 
        }
        
        .info-value.green { 
            color: #22c55e; 
        }
        
        .btn {
            display: block;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            padding: 16px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            width: 100%;
        }
        
        .btn:hover { 
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        .warning { 
            color: #f59e0b; 
            font-size: 0.8rem; 
            margin-top: 16px; 
        }
        
        @media (max-width: 768px) {
            .card { padding: 30px 20px; }
            .logo { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-dot"></div>
    
    <div class="logo">ph4smo.club</div>

    <div class="card" id="mainCard">
        <div class="success-icon" id="icon">🎉</div>
        <div class="card-title" id="title">Key Generated!</div>
        <div class="card-desc" id="desc">Your key is ready. Click to copy it.</div>

        <div class="key-box" id="keyBox" onclick="copyKey()">Loading...</div>
        <div class="copy-hint" id="copyHint">Click key to copy</div>

        <div class="info-box" id="infoBox">
            <div class="info-row">
                <span class="info-label">Type</span>
                <span class="info-value" id="keyType">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">Valid for</span>
                <span class="info-value green" id="keyDuration">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">HWID bound</span>
                <span class="info-value">On first use</span>
            </div>
        </div>

        <a href="https://ph4smo.vercel.app" class="btn" target="_blank">← Back to ph4smo.club</a>
        <p class="warning" id="warning">⚠️ Save your key! It won't be shown again.</p>
    </div>

    <script>
        // Custom cursor
        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
        });
        
        document.querySelectorAll('.btn, .key-box').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform = 'translate(-50%, -50%) scale(1.5)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            });
        });
        
        const params = new URLSearchParams(window.location.search);
        const success = params.get('success');
        const key     = params.get('key');
        const type    = params.get('type') || '12h';
        const error   = params.get('error');

        const keyBox    = document.getElementById('keyBox');
        const copyHint  = document.getElementById('copyHint');
        const icon      = document.getElementById('icon');
        const title     = document.getElementById('title');
        const desc      = document.getElementById('desc');
        const keyType   = document.getElementById('keyType');
        const keyDur    = document.getElementById('keyDuration');
        const warning   = document.getElementById('warning');
        const card      = document.getElementById('mainCard');
        const infoBox   = document.getElementById('infoBox');

        if (error) {
            card.classList.add('error-card');
            icon.textContent = '❌';
            icon.classList.add('error-icon');
            title.textContent = 'Something went wrong';
            infoBox.style.display = 'none';
            warning.style.display = 'none';
            keyBox.style.display = 'none';
            copyHint.style.display = 'none';

            const msgs = {
                token_expired: 'Your checkpoint token expired (10 min limit). Please start over.',
                invalid_step:  'Invalid checkpoint step. Please start over.',
            };
            desc.textContent = msgs[error] || 'An unknown error occurred. Please try again.';
        } else if (success && key) {
            keyBox.textContent = key;
            keyType.textContent = type === '24h' ? '24 Hour' : '12 Hour';
            keyDur.textContent  = type === '24h' ? '24 hours' : '12 hours';
        } else {
            keyBox.textContent = 'No key found';
            warning.style.display = 'none';
        }

        function copyKey() {
            if (!key) return;
            navigator.clipboard.writeText(key).then(() => {
                copyHint.textContent = '✓ Copied to clipboard!';
                copyHint.classList.add('copied');
                setTimeout(() => {
                    copyHint.textContent = 'Click key to copy';
                    copyHint.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
