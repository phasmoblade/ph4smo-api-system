<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — ph4smo.club</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        #loginScreen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-logo { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
        .login-sub { color: #666; font-size: 0.85rem; margin-bottom: 32px; }
        .input {
            width: 100%;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 16px;
        }
        .btn {
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .error { color: #ef4444; font-size: 0.85rem; margin-top: 12px; }
        
        #adminPanel { display: none; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .title { font-size: 1.5rem; font-weight: 700; }
        .logout-btn {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
        }
        .stat-label { color: #666; font-size: 0.85rem; margin-bottom: 8px; }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .keys-list {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
        }
        .key-item {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .key-item:last-child { border-bottom: none; }
        .key-code { font-family: monospace; color: #4ade80; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-card">
            <div class="login-logo">ph4smo.club</div>
            <div class="login-sub">ADMIN PANEL</div>
            <input type="password" id="passwordInput" class="input" placeholder="Enter password..." />
            <button onclick="login()" class="btn">Login</button>
            <div id="loginError" class="error" style="display:none;"></div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel">
        <div class="header">
            <div class="title">Admin Panel</div>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Keys</div>
                <div class="stat-value" id="totalKeys">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Keys</div>
                <div class="stat-value" id="activeKeys">0</div>
            </div>
        </div>

        <div class="keys-list">
            <h3 style="margin-bottom: 16px;">Recent Keys</h3>
            <div id="keysList">Loading...</div>
        </div>
    </div>

    <script>
        // Cookie helpers
        function setCookie(name, value, days) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/';
        }

        function getCookie(name) {
            return document.cookie.split('; ').reduce((r, v) => {
                const parts = v.split('=');
                return parts[0] === name ? decodeURIComponent(parts[1]) : r;
            }, '');
        }

        function deleteCookie(name) {
            setCookie(name, '', -1);
        }

        // Check if already logged in
        const savedSecret = getCookie('admin_session');
        if (savedSecret) {
            document.getElementById('passwordInput').value = savedSecret;
            login();
        }

        async function login() {
            const password = document.getElementById('passwordInput').value;
            const errorEl = document.getElementById('loginError');

            try {
                const res = await fetch('/api/admin?action=list&secret=' + encodeURIComponent(password));
                const data = await res.json();

                if (data.error) {
                    errorEl.textContent = data.error;
                    errorEl.style.display = 'block';
                    deleteCookie('admin_session');
                    return;
                }

                // Save session
                setCookie('admin_session', password, 7); // 7 days

                // Show admin panel
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';

                loadKeys(password);
            } catch (err) {
                errorEl.textContent = 'Connection error';
                errorEl.style.display = 'block';
            }
        }

        function logout() {
            deleteCookie('admin_session');
            location.reload();
        }

        async function loadKeys(secret) {
            try {
                const res = await fetch('/api/admin?action=list&secret=' + encodeURIComponent(secret));
                const data = await res.json();

                if (data.keys) {
                    document.getElementById('totalKeys').textContent = data.keys.length;
                    
                    const active = data.keys.filter(k => !k.banned && (!k.expires || k.expires > Date.now())).length;
                    document.getElementById('activeKeys').textContent = active;

                    const keysList = document.getElementById('keysList');
                    if (data.keys.length === 0) {
                        keysList.innerHTML = '<div style="color: #666;">No keys yet</div>';
                    } else {
                        keysList.innerHTML = data.keys.slice(0, 10).map(k => `
                            <div class="key-item">
                                <div class="key-code">${k.key}</div>
                                <div style="font-size: 0.85rem; color: #666; margin-top: 4px;">
                                    ${k.type} | ${k.hwid || 'Not used'} | ${k.banned ? 'BANNED' : 'Active'}
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch (err) {
                console.error('Failed to load keys:', err);
            }
        }

        // Enter key to login
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
