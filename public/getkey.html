<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Key — ph4smo.club</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            cursor: none;
        }
        
        * { cursor: none !important; }
        
        @media (max-width: 768px) {
            body, * { cursor: auto !important; }
            .cursor, .cursor-dot { display: none; }
        }
        
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,.4);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease;
            transform: translate(-50%, -50%);
        }
        
        .cursor-dot {
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        
        .logo {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 40px;
            text-align: center;
        }
        
        .card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(20px);
        }
        
        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .card-desc {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        .error-box {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px;
            padding: 12px 16px;
            color: #ef4444;
            font-size: 0.85rem;
            margin-bottom: 24px;
            display: none;
        }
        
        .options {
            display: grid;
            gap: 16px;
        }
        
        .option-btn {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            text-decoration: none;
            color: #fff;
            display: block;
        }
        
        .option-btn:hover {
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            transform: translateY(-2px);
        }
        
        .option-icon { font-size: 2rem; margin-bottom: 12px; }
        .option-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
        .option-desc { color: #666; font-size: 0.85rem; }
        
        .back-link {
            margin-top: 24px;
            text-align: center;
        }
        
        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        
        .back-link a:hover { color: #fff; }
        
        @media (max-width: 768px) {
            .card { padding: 30px 20px; }
            .logo { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-dot"></div>
    
    <div class="logo">ph4smo.club</div>

    <div class="card">
        <div class="card-title">🔑 Get Your Key</div>
        <div class="card-desc">Complete tasks to receive your key. Keys are bound to your device.</div>

        <div class="error-box" id="errorBox"></div>

        <div class="options">
            <a href="/api/checkpoint?type=12h" class="option-btn">
                <div class="option-icon">🔑</div>
                <div class="option-title">Get Key</div>
                <div class="option-desc">Complete tasks to get your key</div>
            </a>
        </div>
        
        <div class="back-link">
            <a href="/">← Back to ph4smo.club</a>
        </div>
    </div>

    <script>
        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
        });
        
        document.querySelectorAll('.option-btn').forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform = 'translate(-50%, -50%) scale(1.5)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = 'translate(-50%, -50%) scale(1)';
            });
        });
        
        const params = new URLSearchParams(window.location.search);
        const error  = params.get('error');
        if (error) {
            const box = document.getElementById('errorBox');
            const msgs = {
                token_expired: '⚠️ Your session expired (10 min limit). Please start over.',
                invalid_step:  '⚠️ Invalid session. Please start over.',
                missing_token: '⚠️ Missing verification token. Please start over.',
                not_completed: '⚠️ Tasks not completed. Please complete all tasks.',
            };
            box.textContent = msgs[error] || '⚠️ Something went wrong. Please try again.';
            box.style.display = 'block';
        }
    </script>
</body>
</html>
